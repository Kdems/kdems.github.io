<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>
    SKYBAR Reports
  </title>

  <link rel="icon" href="data:,">

  <script src="https://cdn.tailwindcss.com"></script>

</head>



<body class="bg-slate-100 font-sans">

<div class="flex min-h-screen">



  <!-- SIDEBAR -->
  <aside class="w-64 bg-slate-950 text-white p-6">

    <h1 class="text-4xl font-bold mb-10">
      SKYBAR
    </h1>



    <nav class="space-y-3">

      <a
        href="index.html"
        class="block hover:bg-slate-800 rounded-xl px-4 py-3">
        Dashboard
      </a>

      <a
        href="entry.html"
        class="block hover:bg-slate-800 rounded-xl px-4 py-3">
        Daily Entry
      </a>

      <a
        href="review.html"
        class="block hover:bg-slate-800 rounded-xl px-4 py-3">
        Operating Review
      </a>

      <a
        href="reports.html"
        class="block bg-slate-800 rounded-xl px-4 py-3">
        Reports
      </a>

      <a
        href="settings.html"
        class="block hover:bg-slate-800 rounded-xl px-4 py-3">
        Settings
      </a>

    </nav>

  </aside>








  <!-- MAIN -->
  <main class="flex-1 p-8 space-y-6">


    <div>

      <h2 class="text-4xl font-bold">
        Reports
      </h2>

      <p class="text-slate-500">
        Management reporting and export
      </p>

    </div>








    <!-- KPI -->
    <section class="bg-sky-200 rounded-3xl p-6 shadow">

      <h3 class="font-bold text-xl mb-4">
        Performance Report
      </h3>


      <div class="grid grid-cols-3 gap-4">

        <div class="bg-white/70 rounded-2xl p-4">
          <small>Revenue</small>
          <h4 id="reportRevenueCard"></h4>
        </div>

        <div class="bg-white/70 rounded-2xl p-4">
          <small>Total Cost</small>
          <h4 id="reportCostCard"></h4>
        </div>

        <div class="bg-white/70 rounded-2xl p-4">
          <small>GOP</small>
          <h4 id="reportGopCard"></h4>
        </div>

      </div>



      <div class="grid grid-cols-3 gap-4 mt-4">

        <div class="bg-white/70 rounded-2xl p-4">
          <small>Margin</small>
          <h4 id="reportMarginCard"></h4>
        </div>

        <div class="bg-white/70 rounded-2xl p-4">
          <small>Best Day</small>
          <h4 id="reportBestDayCard"></h4>
        </div>

        <div class="bg-white/70 rounded-2xl p-4">
          <small>Worst Day</small>
          <h4 id="reportWorstDayCard"></h4>
        </div>

      </div>

    </section>








    <!-- EXPORT -->
    <section class="bg-white rounded-3xl p-6 shadow">

      <button
        id="exportCsvBtn"
        class="bg-slate-900 text-white rounded-xl px-6 py-3">

        Export CSV

      </button>

    </section>


  </main>

</div>





<script src="assets/js/storage.js"></script>
<script src="assets/js/settings.js"></script>
<script src="assets/js/calculations.js"></script>
<script src="assets/js/reports.js"></script>

</body>
</html>
