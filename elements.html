  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<body data-page="elements">
  <main class="page-shell">
    <nav class="page-nav" aria-label="Primary navigation">
      <a class="nav-link" href="index.html">Dashboard</a>
      <a class="nav-link" href="generic.html">Operations Review</a>
      <a class="nav-link active" href="elements.html" aria-current="page">UI Library</a>

    <header class="page-header">
      <div>
        <p class="eyebrow">Component library</p>
        <h1>Dashboard UI Elements</h1>

    <section class="component-grid">
      <article class="panel"><p class="label">Buttons</p><div class="stack-row"><button class="button primary">Save Entry</button><button class="button secondary">Reset Form</button><button class="button danger">Delete</button></div></article>

      <article class="panel"><p class="label">Table</p><div class="table-wrap"><table><thead><tr><th>Date</th><th>GOP</th></tr></thead><tbody><tr><td>2026-05-01</td><td class="positive">$13,115</td></tr></tbody></table></div></article>
