<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UI Components | SKYBAR Finance Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="stylesheet" href="assets/css/dashboard.css" />
</head>
<body data-page="elements">
  <div class="app-shell">
    <aside class="sidebar" aria-label="Primary navigation">
      <div class="brand-lockup"><div class="brand-mark">SB</div><div><p class="eyebrow">SKYBAR</p><h1>Finance</h1></div></div>
      <nav class="nav-stack">
        <a class="nav-link" href="index.html">Dashboard</a>
        <a class="nav-link" href="generic.html">Operations Review</a>
        <a class="nav-link active" href="elements.html" aria-current="page">UI Library</a>
      </nav>
    </aside>
    <main class="main-content">
      <header class="topbar"><div><p class="eyebrow">Component library</p><h2>Dashboard UI Elements</h2></div></header>
      <section class="component-grid">
        <article class="panel"><span class="label">Buttons</span><div class="stack-row"><button class="button primary">Primary action</button><button class="button secondary">Secondary action</button><span class="badge positive">On target</span></div></article>
        <article class="panel"><span class="label">Metric card</span><div class="kpi-card"><span>Net sales</span><strong>$128,420</strong><small class="positive">+6.4% vs target</small></div></article>
        <article class="panel"><span class="label">Form controls</span><label class="field"><span>Accounting period</span><select><option>May 2026</option><option>April 2026</option></select></label></article>
        <article class="panel"><span class="label">Table</span><div class="table-wrap"><table><thead><tr><th>Control</th><th>Status</th></tr></thead><tbody><tr><td>Deposit matched</td><td><span class="badge positive">Complete</span></td></tr><tr><td>AP aging</td><td><span class="badge warning">Review</span></td></tr></tbody></table></div></article>
      </section>
    </main>
  </div>
</body>
</html>
