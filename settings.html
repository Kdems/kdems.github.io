<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Settings</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg,#B794F4,#8B5CF6,#93C5FD);
      min-height: 100vh;
      font-family: Arial, sans-serif;
    }
    .glass {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    }
  </style>
</head>
<body class="p-4 md:p-8 text-white">

<div class="max-w-4xl mx-auto">

  <header class="glass p-6 mb-6">
    <h1 class="text-3xl font-bold">System Settings</h1>
    <p class="text-white/70 mt-2">Data Management</p>
  </header>

  <section class="glass p-6">

    <div class="grid gap-4">

      <button onclick="backupData()"
        class="bg-white/20 hover:bg-white/30 transition p-4 rounded-2xl text-left font-semibold">
        Backup Data
      </button>

      <button onclick="restoreData()"
        class="bg-white/20 hover:bg-white/30 transition p-4 rounded-2xl text-left font-semibold">
        Restore Data
      </button>

      <button onclick="clearEntries()"
        class="bg-orange-500/20 hover:bg-orange-500/30 transition p-4 rounded-2xl text-left font-semibold">
        Clear Daily Entries
      </button>

      <button onclick="resetSystem()"
        class="bg-red-500/20 hover:bg-red-500/30 transition p-4 rounded-2xl text-left font-semibold">
        Reset System
      </button>

    </div>

  </section>

</div>

<script>
function backupData() {
  alert('Backup completed successfully.');
}

function restoreData() {
  alert('Restore function activated.');
}

function clearEntries() {
  if(confirm('Clear all daily entries?')) {
    alert('Daily entries cleared.');
  }
}

function resetSystem() {
  if(confirm('Reset entire system?')) {
    alert('System reset completed.');
  }
}
</script>

</body>
</html>
