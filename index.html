<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restaurant Finance Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #B794F4, #8B5CF6, #93C5FD);
      min-height: 100vh;
    }
    .glass {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }
  </style>
</head>
<body class="p-4 md:p-8 text-white">

<header class="glass p-4 mb-6 sticky top-4 z-50">
  <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4">
    <div>
      <h1 class="text-2xl font-bold">Restaurant Finance System</h1>
      <p class="text-white/70 text-sm">Hospitality Business Intelligence</p>
    </div>

    <nav class="flex flex-wrap gap-2">
      <a href="index.html" class="px-4 py-2 rounded-2xl bg-white/20">Dashboard</a>
      <a href="entry.html" class="px-4 py-2 rounded-2xl bg-white/10">Entry</a>
      <a href="reports.html" class="px-4 py-2 rounded-2xl bg-white/10">Reports</a>
      <a href="review.html" class="px-4 py-2 rounded-2xl bg-white/10">Review</a>
      <a href="settings.html" class="px-4 py-2 rounded-2xl bg-white/10">Settings</a>
    </nav>
  </div>
</header>

<div class="max-w-7xl mx-auto">

  <section class="grid md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
    <div class="glass p-5"><p>YTD Revenue</p><h2 id="ytdRevenue" class="text-2xl font-bold mt-2">0</h2></div>
    <div class="glass p-5"><p>YTD Budget</p><h2 id="ytdBudget" class="text-2xl font-bold mt-2">0</h2></div>
    <div class="glass p-5"><p>Achievement</p><h2 class="text-2xl font-bold text-green-300 mt-2">97.4%</h2></div>
    <div class="glass p-5"><p>Variance</p><h2 class="text-2xl font-bold text-red-300 mt-2">-72,123</h2></div>
  </section>

  <section class="glass p-6">
    <h2 class="text-xl font-semibold mb-4">Revenue Trend</h2>
    <canvas id="revenueChart"></canvas>
  </section>

</div>

<script>
function animateCounter(id, endValue) {
  const element = document.getElementById(id);
  let current = 0;
  const increment = endValue / 100;

  const timer = setInterval(() => {
    current += increment;
    if (current >= endValue) {
      current = endValue;
      clearInterval(timer);
    }
    element.innerText = Math.floor(current).toLocaleString();
  }, 15);
}

animateCounter('ytdRevenue', 2676573);
animateCounter('ytdBudget', 2748696);

new Chart(document.getElementById('revenueChart'), {
  type: 'line',
  data: {
    labels: ['Week 1','Week 2','Week 3','Week 4'],
    datasets: [{
      data: [420000, 580000, 730000, 946573],
      borderColor: 'white',
      tension: 0.4
    }]
  }
});
</script>

</body>
</html>
