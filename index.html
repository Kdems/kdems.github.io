<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Entry</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg,#B794F4,#8B5CF6,#93C5FD);
      min-height: 100vh;
      font-family: Arial, sans-serif;
    }
    .glass {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    }
    input {
      color: black;
    }
  </style>
</head>
<body class="p-4 md:p-8 text-white">

<div class="max-w-6xl mx-auto">

  <div class="glass p-6 mb-6">
    <h1 class="text-3xl font-bold">Daily Finance Entry</h1>
    <p class="text-white/70 mt-2">Restaurant / Hospitality Data Entry</p>
  </div>

  <!-- Revenue Entry -->
  <div class="glass p-6 mb-6">
    <h2 class="text-xl font-semibold mb-4">Revenue Entry (Daily)</h2>

    <div class="grid md:grid-cols-3 gap-4">
      <input id="entryDate" type="date" class="p-3 rounded-xl">
      <input id="foodRevenue" type="number" placeholder="Food Revenue" class="p-3 rounded-xl">
      <input id="bevRevenue" type="number" placeholder="Beverage Revenue" class="p-3 rounded-xl">
      <input id="otherRevenue" type="number" placeholder="Other Revenue" class="p-3 rounded-xl">
      <input id="budget" readonly placeholder="Daily Budget" class="p-3 rounded-xl bg-gray-200">
      <input id="totalRevenue" readonly placeholder="Total Revenue" class="p-3 rounded-xl bg-gray-200">
    </div>
  </div>

  <!-- Target Entry -->
  <div class="glass p-6 mb-6">
    <h2 class="text-xl font-semibold mb-4">Target Entry (Monthly)</h2>

    <div class="grid md:grid-cols-3 gap-4">
      <input id="monthlyFoodTarget" type="number" placeholder="Monthly Food Target" class="p-3 rounded-xl">
      <input id="monthlyBevTarget" type="number" placeholder="Monthly Beverage Target" class="p-3 rounded-xl">
      <input id="monthlyRevenue" readonly placeholder="Monthly Revenue Target" class="p-3 rounded-xl bg-gray-200">

      <input id="lyFood" type="number" placeholder="LY Food Revenue" class="p-3 rounded-xl">
      <input id="lyBev" type="number" placeholder="LY Beverage Revenue" class="p-3 rounded-xl">
      <input id="lyOther" type="number" placeholder="LY Other Revenue" class="p-3 rounded-xl">

      <input id="gopTarget" type="number" placeholder="Monthly GOP Target" class="p-3 rounded-xl">
    </div>
  </div>

  <!-- Cost Entry -->
  <div class="glass p-6 mb-6">
    <h2 class="text-xl font-semibold mb-4">Cost Entry (Monthly)</h2>

    <div class="grid md:grid-cols-3 gap-4">
      <input id="foodCostPercent" type="number" placeholder="Food Cost %" class="p-3 rounded-xl">
      <input id="bevCostPercent" type="number" placeholder="Beverage Cost %" class="p-3 rounded-xl">
      <input id="fixedCostPercent" type="number" placeholder="Fixed Cost %" class="p-3 rounded-xl">
    </div>
  </div>

  <!-- Annual -->
  <div class="glass p-6 mb-6">
    <h2 class="text-xl font-semibold mb-4">Annual Target</h2>

    <div class="grid md:grid-cols-2 gap-4">
      <input type="number" placeholder="Annual Revenue" class="p-3 rounded-xl">
      <input type="number" placeholder="Annual GOP" class="p-3 rounded-xl">
    </div>
  </div>

</div>

<script>
function calculateDaysInMonth(dateString) {
  if (!dateString) return 30;
  const date = new Date(dateString);
  return new Date(date.getFullYear(), date.getMonth()+1, 0).getDate();
}

function calculateAll() {
  const food = Number(document.getElementById('foodRevenue').value) || 0;
  const bev = Number(document.getElementById('bevRevenue').value) || 0;
  const other = Number(document.getElementById('otherRevenue').value) || 0;
  const date = document.getElementById('entryDate').value;

  const monthlyFood = Number(document.getElementById('monthlyFoodTarget').value) || 0;
  const monthlyBev = Number(document.getElementById('monthlyBevTarget').value) || 0;

  const total = food + bev + other;
  document.getElementById('totalRevenue').value = total.toLocaleString();

  const monthlyBudget = monthlyFood + monthlyBev;
  document.getElementById('monthlyRevenue').value = monthlyBudget.toLocaleString();

  const days = calculateDaysInMonth(date);
  const dailyBudget = monthlyBudget / days;
  document.getElementById('budget').value = Math.round(dailyBudget).toLocaleString();
}

['foodRevenue','bevRevenue','otherRevenue','entryDate','monthlyFoodTarget','monthlyBevTarget']
.forEach(id => {
  document.getElementById(id).addEventListener('input', calculateAll);
});
</script>

</body>
</html>
