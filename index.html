<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #B794F4, #8B5CF6, #93C5FD);
      min-height: 100vh;
    }

    .glass {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }
  </style>
</head>
<body class="p-4 md:p-8 text-white">

  <div class="max-w-7xl mx-auto">

    <!-- Header -->
    <header class="glass p-6 mb-6">
      <h1 class="text-3xl font-bold">Restaurant Finance Dashboard</h1>
      <p class="text-white/70 mt-1">YTD • MTD • GOP Analytics</p>
    </header>

    <!-- KPI Cards -->
    <section class="grid md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">

      <div class="glass p-5">
        <p class="text-white/70">YTD Revenue</p>
        <h2 class="text-2xl font-bold mt-2">2,676,573</h2>
      </div>

      <div class="glass p-5">
        <p class="text-white/70">YTD Budget</p>
        <h2 class="text-2xl font-bold mt-2">2,748,696</h2>
      </div>

      <div class="glass p-5">
        <p class="text-white/70">Achievement</p>
        <h2 class="text-2xl font-bold mt-2 text-green-300">97.4%</h2>
      </div>

      <div class="glass p-5">
        <p class="text-white/70">Variance</p>
        <h2 class="text-2xl font-bold mt-2 text-red-300">-72,123</h2>
      </div>

    </section>

    <!-- Chart -->
    <section class="glass p-6">
      <h2 class="text-xl font-semibold mb-4">Revenue Trend</h2>
      <canvas id="revenueChart"></canvas>
    </section>

  </div>

<script>
const ctx = document.getElementById('revenueChart');

new Chart(ctx, {
  type: 'line',
  data: {
    labels: ['Week 1','Week 2','Week 3','Week 4'],
    datasets: [{
      label: 'Revenue',
      data: [420000, 580000, 730000, 946573],
      borderColor: 'white',
      tension: 0.4
    }]
  }
});
</script>

</body>
</html>
